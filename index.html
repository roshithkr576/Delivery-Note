<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Holdings | Admin Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #e63946;
            --sidebar: #111827;
            --bg: #f9fafb;
            --card: #ffffff;
            --text-main: #1f2937;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        
        body { 
            margin: 0; 
            display: flex; 
            flex-direction: row; /* Default PC */
            min-height: 100vh; 
            background: var(--bg); 
            color: var(--text-main); 
        }

        /* --- Responsive Sidebar --- */
        .mobile-toggle {
            display: none; /* Hidden on PC */
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        nav { 
            width: 260px; 
            background: var(--sidebar); 
            color: #9ca3af; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .nav-header { padding: 30px 20px; color: white; font-weight: 800; font-size: 1.2rem; border-bottom: 1px solid #1f2937; }
        .nav-item { padding: 16px 24px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover { background: #1f2937; color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* --- Main Content --- */
        main { flex-grow: 1; overflow-y: auto; padding: 40px; width: 100%; }
        .page { display: none; max-width: 1100px; margin: 0 auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Controls */
        .card { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h3 { margin-top: 0; font-size: 1.1rem; color: var(--primary); margin-bottom: 20px; }
        
        .input-group { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 20px; 
        }

        /* Inventory Group Layout */
        .inventory-controls {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr 1fr auto;
            gap: 15px;
            align-items: flex-end;
        }

        .field { display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.8rem; font-weight: 600; color: #6b7280; text-transform: uppercase; }
        input { padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; width: 100%; }

        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-pdf { background: var(--accent); color: white; width: 100%; margin-top: 20px; }

        /* --- PDF Wrap & Preview Scaling --- */
        #pdf-wrap { 
            display: flex; 
            justify-content: center; 
            margin-top: 20px; 
            overflow-x: auto; /* Allow scroll on mobile for preview */
            padding-bottom: 20px;
        }

        #delivery-note { 
            background: white; 
            width: 210mm; 
            min-height: 297mm; 
            padding: 15mm; 
            border: 1px solid #ddd; 
            transform-origin: top center;
        }

        /* --- Internal PDF Table Styles --- */
        .dn-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #000; padding-bottom: 20px; margin-bottom: 20px; }
        .logo-container { width: 160px; height: 100px; }
        #main-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
        .dn-title-bar { background: #f3f4f6; text-align: center; padding: 10px; font-weight: 800; text-transform: uppercase; border: 2px solid #000; }
        .info-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .info-table td { border: 2px solid #000; padding: 10px; font-size: 12px; }
        .bg-gray { background: #f9fafb; font-weight: bold; width: 15%; }
        .items-table { width: 100%; border-collapse: collapse; }
        .items-table th { background: #000; color: white; padding: 10px; font-size: 11px; }
        .items-table td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 12px; }
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; margin-top: 40px; }
        .footer-box { border: 2px solid #000; padding: 10px; height: 100px; display: flex; flex-direction: column; justify-content: space-between; }
        .sig-text { border-top: 1px solid #000; text-align: center; font-size: 10px; font-weight: bold; }

        /* --- MOBILE RESPONSIVE QUERIES --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            .mobile-toggle { display: block; }

            nav {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                z-index: 999;
                transform: translateX(-100%); /* Hide by default on mobile */
            }

            nav.open { transform: translateX(0); }

            main { padding: 60px 15px 20px 15px; }

            .inventory-controls {
                grid-template-columns: 1fr; /* Stack inputs on mobile */
            }

            .card { padding: 15px; }

            /* Scale the PDF preview down to fit mobile screens */
            #delivery-note {
                transform: scale(0.4); /* Shrink preview */
                margin-top: -300px; /* Offset the scale gap */
            }
            
            #pdf-wrap {
                height: 500px; /* Constrain height since it's scaled */
            }
        }
    </style>
</head>
<body>

    <div class="mobile-toggle" onclick="toggleNav()">☰ Menu</div>

    <nav id="sidebar">
        <div class="nav-header">TU HOLDINGS</div>
        <div class="nav-item active" onclick="showPage('generator', event)"><span>📝</span> Create Note</div>
        <div class="nav-item" onclick="showPage('dashboard', event)"><span>⚙️</span> System Settings</div>
    </nav>

    <main onclick="closeNav()">
        <div id="generator" class="page active">
            <div class="card">
                <h3><span>📍</span> Delivery Context</h3>
                <div class="input-group">
                    <div class="field"><label>DN Number</label><input type="text" id="input-dn-no" placeholder="DN-2024-001" oninput="sync()"></div>
                    <div class="field"><label>Date</label><input type="date" id="input-date" oninput="sync()"></div>
                    <div class="field"><label>Origin</label><input type="text" id="input-from" placeholder="Warehouse A" oninput="sync()"></div>
                    <div class="field"><label>Destination</label><input type="text" id="input-to" placeholder="Client Location" oninput="sync()"></div>
                </div>
                <div class="input-group">
                    <div class="field"><label>Prepared By</label><input type="text" id="input-prepared" oninput="sync()"></div>
                    <div class="field"><label>Approved By</label><input type="text" id="input-approved" oninput="sync()"></div>
                </div>
            </div>

            <div class="card">
                <h3><span>📦</span> Item Inventory</h3>
                <div class="inventory-controls">
                    <div class="field"><label>Photo</label><input type="file" id="item-img-input" accept="image/*"></div>
                    <div class="field"><label>Description</label><input type="text" id="item-desc" placeholder="Product Name"></div>
                    <div class="field"><label>UOM</label><input type="text" id="item-uom" placeholder="PCS"></div>
                    <div class="field"><label>Qty</label><input type="number" id="item-qty" placeholder="0"></div>
                    <div class="field"><button class="btn-add" onclick="addItem()">Add</button></div>
                </div>
                <button class="btn-pdf" id="download-btn" onclick="generatePDF()">Generate Professional PDF</button>
            </div>

            <div id="pdf-wrap">
                <div id="delivery-note">
                    <div class="dn-header">
                        <div class="logo-container">
                            <img id="main-logo" src="https://tuholdings.ae/wp-content/uploads/2024/06/tu-holding-group-1024x881.png" alt="TU Group">
                        </div>
                        <div class="header-text">
                            <h1>TU MANAGEMENT LLC</h1>
                            <p>Abu Dhabi</p>
                        </div>
                    </div>
                    <div class="dn-title-bar">Delivery Note</div>
                    <table class="info-table">
                        <tr>
                            <td class="bg-gray">DN NO:</td><td id="dn-no">---</td>
                            <td class="bg-gray">DATE:</td><td id="dn-date">---</td>
                        </tr>
                        <tr>
                            <td class="bg-gray">FROM:</td><td id="dn-from">TRUST US</td>
                            <td class="bg-gray">TO:</td><td id="dn-to">---</td>
                        </tr>
                    </table>
                    <table class="items-table" id="items-table">
                        <thead>
                            <tr>
                                <th style="width:40px">No.</th>
                                <th style="width:100px">Image</th>
                                <th>Item Description</th>
                                <th style="width:80px">UOM</th>
                                <th style="width:80px">QTY</th>
                                <th class="no-print">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dn-body"></tbody>
                    </table>
                    <div class="footer-grid">
                        <div class="footer-box"><span>Prepared:</span><span id="disp-prepared">---</span><div class="sig-text">SIGNATURE</div></div>
                        <div class="footer-box"><span>Verified:</span><span id="disp-approved">---</span><div class="sig-text">STAMP</div></div>
                        <div class="footer-box"><span>Received:</span><span id="disp-received"></span><div class="sig-text">NAME & SIGN</div></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard" class="page">
            <div class="card">
                <h2>System Settings</h2>
                <input type="file" id="logo-upload" accept="image/*" onchange="updateCompanyLogo(this)">
            </div>
        </div>
    </main>

    <script>
        // UI Logic
        function toggleNav() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function closeNav() {
            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        function showPage(pageId, event) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            closeNav();
        }

        // Logic sync functions (Keeping your original logic)
        window.onload = () => { document.getElementById('input-date').valueAsDate = new Date(); sync(); };

        function sync() {
            document.getElementById('dn-no').innerText = document.getElementById('input-dn-no').value || '---';
            document.getElementById('dn-date').innerText = document.getElementById('input-date').value || '---';
            document.getElementById('dn-from').innerText = (document.getElementById('input-from').value || 'TRUST US').toUpperCase();
            document.getElementById('dn-to').innerText = (document.getElementById('input-to').value || '---').toUpperCase();
            document.getElementById('disp-prepared').innerText = (document.getElementById('input-prepared').value || '---').toUpperCase();
            document.getElementById('disp-approved').innerText = (document.getElementById('input-approved').value || '---').toUpperCase();
        }

        function addItem() {
            const desc = document.getElementById('item-desc').value;
            const uom = document.getElementById('item-uom').value || 'PCS';
            const qty = document.getElementById('item-qty').value;
            const imgFile = document.getElementById('item-img-input').files[0];
            if(!desc || !qty) return alert("Fill description and quantity");

            const tbody = document.getElementById('dn-body');
            const row = tbody.insertRow();
            
            const render = (src = '') => {
                row.innerHTML = `<td>${tbody.rows.length}</td><td>${src ? `<img src="${src}" style="width:60px">` : '-'}</td>
                <td style="text-align:left">${desc.toUpperCase()}</td><td>${uom.toUpperCase()}</td><td>${qty}</td>
                <td class="no-print"><button onclick="this.parentElement.parentElement.remove()">X</button></td>`;
            };

            if(imgFile) {
                const r = new FileReader(); r.onload = (e) => render(e.target.result); r.readAsDataURL(imgFile);
            } else render();
        }

        async function generatePDF() {
            const element = document.getElementById('delivery-note');
            const opt = {
                margin: 5,
                filename: 'DeliveryNote.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>
